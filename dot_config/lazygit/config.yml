# notARepository: skip

git:
  tabWidth: 2
  pagers:
    - # keep this if you like; it's part of the paging config surface
      colorArg: always
      # KEY: use difftastic as an external diff command
      externalDiffCommand: difft --color=always --syntax-highlight=on --tab-width=2 --parse-error-limit 50
      # Recommended if you previously used delta/diff-so-fancy as a pager:
      # difftastic output is already "final", piping it through a pager like delta usually makes it worse.
      pager: ""
      useConfig: false
os:
  edit: "nvim {{filename}}"
  open: "open {{filename}}"
gui:
  sidePanelWidth: 0.2
